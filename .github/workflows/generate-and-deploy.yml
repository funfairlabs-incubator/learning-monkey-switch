name: Generate and Deploy

on:
  schedule:
    # One topic per evening at 19:00 UTC (8pm BST)
    # Day → topic mapping:
    # Mon → uk-education (priority #1)
    # Tue → mcp-ai
    # Wed → architecture
    # Thu → leadership
    # Fri → networks
    # Sat → gcp-infra
    # Sun → nextjs-fullstack, devtools-workflow, tech-news (catch-all for remaining 3)
    - cron: '0 19 * * 1'   # Monday    — uk-education
    - cron: '0 19 * * 2'   # Tuesday   — mcp-ai
    - cron: '0 19 * * 3'   # Wednesday — architecture
    - cron: '0 19 * * 4'   # Thursday  — leadership
    - cron: '0 19 * * 5'   # Friday    — networks
    - cron: '0 19 * * 6'   # Saturday  — gcp-infra
    - cron: '0 8  * * 0'   # Sunday    — nextjs-fullstack, devtools-workflow, tech-news
  workflow_dispatch:
    inputs:
      topic:
        description: 'Single topic slug to generate (leave blank for scheduled day)'
        type: choice
        default: ''
        options:
          - ''
          - uk-education
          - mcp-ai
          - architecture
          - leadership
          - networks
          - gcp-infra
          - nextjs-fullstack
          - devtools-workflow
          - tech-news
      force_regenerate:
        description: 'Force regenerate even if fresh'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve topic(s) for today
        id: topics
        run: |
          # Manual override takes priority
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            echo "slugs=${{ github.event.inputs.topic }}" >> $GITHUB_OUTPUT
            echo "Running manual topic: ${{ github.event.inputs.topic }}"
            exit 0
          fi

          # Derive from day of week
          DOW=$(date -u +%u)  # 1=Mon … 7=Sun
          case $DOW in
            1) SLUGS="uk-education" ;;
            2) SLUGS="mcp-ai" ;;
            3) SLUGS="architecture" ;;
            4) SLUGS="leadership" ;;
            5) SLUGS="networks" ;;
            6) SLUGS="gcp-infra" ;;
            7) SLUGS="nextjs-fullstack devtools-workflow tech-news" ;;
            *) SLUGS="" ;;
          esac

          echo "slugs=$SLUGS" >> $GITHUB_OUTPUT
          echo "Today is DOW=$DOW, running: $SLUGS"

      - name: Generate content
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCE_REGENERATE: ${{ github.event.inputs.force_regenerate || 'false' }}
          TOPIC_SLUGS: ${{ steps.topics.outputs.slugs }}
        run: node scripts/generate.mjs

      - name: Build static site
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
        run: node scripts/build.mjs

      - name: Commit generated content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/ public/
          git diff --staged --quiet || git commit -m "chore: regenerate content $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          cname: learn.funfairlabs.com
